spring.application.name=fiscus-backend

# MySQL Connection (Reads from environment, defaults to local if missing)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fiscus_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true