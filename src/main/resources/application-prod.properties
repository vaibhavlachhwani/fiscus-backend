spring.application.name=fiscus-backend
server.port=${PORT:8080}

# MySQL Connection (Injected securely by Render Environment Variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update

# PERFORMANCE FIX: Turned OFF in prod. Printing every SQL query to the cloud console will drastically slow down your API and cost memory.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT (Injected securely by Render Environment Variables)
jwt.secret=${JWT_SECRET}
# Defaults to 24 hours if not explicitly set in Render
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger / OpenAPI Setup (Forces the documentation to be visible to the public)
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true